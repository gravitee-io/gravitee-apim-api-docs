version: 2.1

orbs:
    keeper: gravitee-io/keeper@0.7.0

parameters:
    version:
        type: string
        default: ""
        description: "APIM version to ingest (e.g. 4.11.5). When non-empty, triggers the ingest workflow."
    dry_run:
        type: boolean
        default: false
        description: "If true, run the ingest and stage the commit on gh-pages but do not push."

# --- Reusable steps ---------------------------------------------------------
# Both workflows (ingest, deploy-static) need the same prelude: bot identity
# set up, gh-pages branch checked out as a worktree at ./publish.
commands:
    setup-bot-and-gh-pages-worktree:
        description: "Configure git as gravitee-bot and add gh-pages as a worktree at ./publish"
        steps:
            - checkout
            - add_ssh_keys:
                fingerprints:
                  - ac:88:23:8f:c6:0f:7d:f0:fc:df:73:20:34:56:02:6c
            - keeper/env-export:
                  secret-url: keeper://IZd-yvsMopfQEa_0j1SDvg/field/login
                  var-name: GIT_USER_NAME
            - keeper/env-export:
                  secret-url: keeper://IZd-yvsMopfQEa_0j1SDvg/custom_field/email
                  var-name: GIT_USER_EMAIL
            - run:
                  name: Configure git identity (gravitee-bot)
                  command: |
                      git config --global user.name "${GIT_USER_NAME}"
                      git config --global user.email "${GIT_USER_EMAIL}"
            - run:
                  name: Add gh-pages as a worktree (or bootstrap if missing)
                  command: |
                      if git ls-remote --exit-code --heads origin gh-pages >/dev/null; then
                          git fetch origin gh-pages:gh-pages
                          git worktree add publish gh-pages
                      else
                          echo "gh-pages does not exist yet on origin — creating an orphan branch."
                          git worktree add --orphan -b gh-pages publish
                          rm -rf publish/* publish/.[!.]* 2>/dev/null || true
                      fi

# --- Jobs -------------------------------------------------------------------
jobs:
    ingest:
        docker:
            - image: cimg/openjdk:17.0
        environment:
            VERSION: << pipeline.parameters.version >>
            DRY_RUN: << pipeline.parameters.dry_run >>
        steps:
            - setup-bot-and-gh-pages-worktree

            # APIM releases publish to Sonatype's staging, which then syncs to
            # Maven Central. The propagation typically takes 10-30 minutes and
            # has no public progress signal. We poll the management-rest jar
            # (the only one whose content depends on a build, hence the slowest
            # to be ready) and proceed once it 200s. If the other three jars
            # are not yet there, the ingest step itself will fail loudly — but
            # in practice Sonatype publishes the whole batch atomically.
            - run:
                  name: Wait for $VERSION on Maven Central
                  command: |
                      ART_URL="https://repo.maven.apache.org/maven2/io/gravitee/apim/rest/api/management/gravitee-apim-rest-api-management-rest/${VERSION}/gravitee-apim-rest-api-management-rest-${VERSION}.jar"
                      for i in $(seq 1 60); do
                        if curl -fsI "$ART_URL" >/dev/null; then
                          echo "Artifact available on Maven Central."
                          exit 0
                        fi
                        echo "Not yet on Maven Central (attempt $i/60), retrying in 60s…"
                        sleep 60
                      done
                      echo "ERROR: $ART_URL not available after 60 minutes — aborting." >&2
                      exit 1

            - run:
                  name: Carry forward previously-published specs into working tree
                  command: |
                      mkdir -p specs
                      if [ -d publish/specs ]; then
                          cp -a publish/specs/. specs/
                      fi

            - run:
                  name: Ingest APIM $VERSION
                  command: ./scripts/ingest.sh "$VERSION"

            - run:
                  name: Sync deliverables onto gh-pages worktree
                  command: |
                      # We delete + recopy entire dirs to mimic `rsync --delete` and keep
                      # gh-pages exactly aligned with main + the just-ingested specs.
                      # Identical files produce no git diff, so this stays idempotent.
                      cp index.html publish/
                      rm -rf publish/assets && cp -r assets publish/assets
                      rm -rf publish/specs && cp -r specs publish/specs

            - run:
                  name: Commit and push to gh-pages
                  command: |
                      cd publish
                      if [ -z "$(git status --porcelain)" ]; then
                          echo "No changes to deploy."
                          exit 0
                      fi
                      git add -A
                      git commit -m "chore: deploy APIM ${VERSION} [skip ci]"
                      if [ "$DRY_RUN" = "true" ]; then
                          echo "Dry-run mode — skipping push. Staged commit:"
                          git log -1 --stat
                          exit 0
                      fi
                      git push origin gh-pages

    # Deploys index.html + assets/ from main onto gh-pages without touching specs/.
    # This lets UI/style fixes ship immediately, instead of waiting for the next
    # ingestion (which only happens on APIM releases).
    deploy-static:
        docker:
            - image: cimg/openjdk:17.0
        steps:
            - setup-bot-and-gh-pages-worktree

            - run:
                  name: Sync static site onto gh-pages worktree (specs/ untouched)
                  command: |
                      cp index.html publish/
                      rm -rf publish/assets && cp -r assets publish/assets

            - run:
                  name: Commit and push to gh-pages
                  command: |
                      cd publish
                      if [ -z "$(git status --porcelain)" ]; then
                          echo "Static site already up to date on gh-pages."
                          exit 0
                      fi
                      git add -A
                      git commit -m "chore: deploy static site update [skip ci]"
                      git push origin gh-pages

# --- Workflows --------------------------------------------------------------
workflows:
    # Triggered by an external API call (typically APIM's release pipeline) or
    # manually from the CircleCI UI by setting the `version` parameter.
    ingest-on-dispatch:
        when:
            not:
                equal: ["", << pipeline.parameters.version >>]
        jobs:
            - ingest:
                  context: cicd-orchestrator

    # Triggered by every push to main when no version parameter is set
    # (so the ingest dispatcher never lands here). Branch filter on `main`
    # ensures feature branches don't deploy.
    deploy-static-on-main-push:
        when:
            and:
                - equal: ["", << pipeline.parameters.version >>]
                - equal: ["main", << pipeline.git.branch >>]
        jobs:
            - deploy-static:
                  context: cicd-orchestrator
